site_name: OpenModal
site_url: https://akhatua2.github.io/openmodal
repo_url: https://github.com/akhatua2/openmodal
repo_name: akhatua2/openmodal

theme:
  name: material
  logo: icon.png
  favicon: favicon.png
  palette:
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.path
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started:
    - Setup: setup.md
    - Providers: providers.md
  - Examples:
    - Overview: examples/index.md
    - Getting Started:
      - Hello World: examples/hello_world.md
      - Web Scraper: examples/web_scraper.md
    - GPU:
      - vLLM Serving: examples/vllm_serving.md
      - SFT Finetuning: examples/sft_finetune.md
    - Sandboxes:
      - Sandboxes: examples/sandbox.md
    - Benchmarks:
      - CooperBench: examples/cooperbench.md
      - SWE-bench with Harbor: examples/harbor.md
  - Roadmap: roadmap.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
      toc_depth: 3
