name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if version changed
        id: version
        run: |
          pip install tomli
          NEW=$(python -c "import tomli; print(tomli.load(open('pyproject.toml','rb'))['project']['version'])")
          git show HEAD~1:pyproject.toml > /tmp/old_pyproject.toml 2>/dev/null || echo '[project]\nversion = "0.0.0"' > /tmp/old_pyproject.toml
          OLD=$(python -c "import tomli; print(tomli.load(open('/tmp/old_pyproject.toml','rb'))['project']['version'])")
          echo "new=$NEW old=$OLD"
          if [ "$NEW" != "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.version.outputs.changed == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_KEY }}
        run: |
          pip install twine
          twine upload dist/*
